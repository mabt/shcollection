########################################################## 80

<VirtualHost *:80>
ServerAdmin support@fast-mage.com
ServerName devm2.maxento.fr

ProxyPreserveHost On
ProxyPass / http://127.0.0.1:6091/
ProxyPassReverse / http://127.0.0.1:6091/

DocumentRoot /home/user/www/exemple.com

<IfModule security2_module>
    SecAuditEngine Off
    SecRuleEngine Off
</IfModule>

ErrorLog /home/user/logs/apache/exemple.com.error.log
CustomLog /home/user/logs/apache/exemple.com.access.log combined env=!dontlog

<Directory /home/user/www/exemple.com>
Options Indexes FollowSymLinks MultiViews Includes
AllowOverride All
Require all granted
</Directory>

########################################################## 433

</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>

ProxyPreserveHost On
ProxyPass / http://127.0.0.1:6091/
ProxyPassReverse / http://127.0.0.1:6091/
RequestHeader set X-Forwarded-Port "443"
RequestHeader set X-Forwarded-Proto "https"

SSLEngine on

SSLCertificateFile	/usr/local/acme.sh/exemple.com/fullchain.cer
SSLCertificateKeyFile /usr/local/acme.sh/exemple.com/exemple.com.key

ServerAdmin support@fast-mage.com
ServerName exemple.com

DocumentRoot /home/user/www/exemple.com

<IfModule security2_module>
    SecAuditEngine Off
    SecRuleEngine Off
</IfModule>

ErrorLog /home/user/logs/apache/exemple.com.error.log
CustomLog /home/user/logs/apache/exemple.com.access.log combined env=!dontlog

<Directory /home/user/www/exemple.com>
Options Indexes FollowSymLinks MultiViews Includes
AllowOverride All
Require all granted
</Directory>

</VirtualHost>
</IfModule>

########################################################## FOR VARNISH

<VirtualHost *:2080>

ServerAdmin support@fast-mage.com
ServerName exemple.com

DocumentRoot /home/user/www/exemple.com

<IfModule security2_module>
    SecAuditEngine Off
    SecRuleEngine Off
</IfModule>

ErrorLog /home/user/logs/apache/exemple.com.error.log
CustomLog /home/user/logs/apache/exemple.com.access.log combined env=!dontlog

<Directory /home/user/www/exemple.com>
Options Indexes FollowSymLinks MultiViews Includes
AllowOverride All
Require all granted
</Directory>

<FilesMatch \.php$>
    SetHandler "proxy:unix:/run/php/php7.4-exemple.com.sock|fcgi://localhost"
</FilesMatch>

</VirtualHost>
